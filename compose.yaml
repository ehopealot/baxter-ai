# Baxter's runtime fleet, run via `make run` / `make stop`.
#
# The Makefile BUILDS the images (arch-specific codapi binary, the two sandbox
# images, the app image) and owns the durable resources (the shared network and
# the config volume, both `external` below); compose only *runs* the containers.
# So a bare `docker compose up` would try to pull the images and fail -- always
# go through the Makefile, which builds first and exports the vars this file
# needs.
#
# ${PROJECT} / ${CODAPI_TMP} and the project name come from the environment the
# Makefile exports, so the same file yields app-* containers in the dev sandbox
# and baxter-* on the host (PROJECT = the repo directory name).

services:
  # Offline code-execution sandbox. Holds the docker socket to launch hardened
  # sandbox siblings (NOT privileged). The service name `codapi` is its network
  # alias, so code-cli's http://codapi:1313 resolves from every service here.
  # TMPDIR is bind-mounted at an identical host path so codapi's per-run code
  # dir resolves on the host daemon (docker-outside-of-docker). Holds no secrets.
  codapi:
    image: ${PROJECT:?run via the Makefile (make run), not bare docker compose}-codapi
    container_name: ${PROJECT}-codapi-svc
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CODAPI_TMP:?run via the Makefile (make run), not bare docker compose}:${CODAPI_TMP}
    environment:
      TMPDIR: ${CODAPI_TMP}

  # Mail poller (image default CMD = scripts/poll.mjs). OPT-IN: gated behind the
  # `mail` profile, so a plain `docker compose up` (i.e. `make run`) does NOT
  # start it -- Discord is the default surface. `make run-mail` enables the
  # profile. Uses AgentMail (an API key, no OAuth/token renewal); run `make inbox`
  # once to provision the inbox. See the README.
  run:
    image: ${PROJECT}-app
    init: true  # tini as PID1: reap zombie browser children a crashed invisible-cli daemon leaves behind
    container_name: ${PROJECT}-run
    profiles: ["mail"]
    restart: unless-stopped
    depends_on: [codapi]
    env_file: [app/.env]
    # Selects DISCORD_LOG_WEBHOOK_MAIL from app/.env for the log mirror (a literal,
    # since compose ${} can't read env_file). See runtime.mjs's shipper.
    environment: { DISCORD_LOG_SURFACE: mail }
    volumes:
      - config:/home/node
    mem_limit: 8g
    shm_size: 2g

  # Discord gateway.
  discord:
    image: ${PROJECT}-app
    init: true  # tini as PID1: reap zombie browser children a crashed invisible-cli daemon leaves behind
    container_name: ${PROJECT}-discord
    restart: unless-stopped
    depends_on: [codapi]
    env_file: [app/.env]
    environment: { DISCORD_LOG_SURFACE: discord }
    volumes:
      - config:/home/node
    mem_limit: 8g
    shm_size: 2g
    command: node scripts/discord-bot.mjs

  # Heartbeat scheduler.
  heartbeat:
    image: ${PROJECT}-app
    init: true  # tini as PID1: reap zombie browser children a crashed invisible-cli daemon leaves behind
    container_name: ${PROJECT}-heartbeat
    restart: unless-stopped
    depends_on: [codapi]
    env_file: [app/.env]
    environment: { DISCORD_LOG_SURFACE: heartbeat }
    volumes:
      - config:/home/node
    mem_limit: 8g
    shm_size: 2g
    command: node scripts/heartbeat.mjs

  # "Fast Baxter" voice surface (scripts/voice-bot.mjs). OPT-IN, gated behind the
  # `voice` profile so `make run`/`run-mail` do NOT start it -- experimental, and
  # it self-disables (exit 0) unless DISCORD_VOICE_CHANNEL_ID is set in app/.env.
  # `make voice` enables the profile.
  voice:
    image: ${PROJECT}-app
    init: true  # tini as PID1: reap zombie browser children a crashed invisible-cli daemon leaves behind
    container_name: ${PROJECT}-voice
    profiles: ["voice"]
    # on-failure (not unless-stopped): the documented exit-0 self-disable (no
    # DISCORD_VOICE_CHANNEL_ID) then stays DOWN instead of flapping forever, while a
    # real crash (login failure, uncaught error) still restarts. Trade-off:
    # on-failure does NOT survive a Docker daemon / Colima restart -- after a host
    # reboot, re-run `make voice` (the rest of the fleet comes back on its own).
    restart: on-failure
    env_file: [app/.env]
    environment: { DISCORD_LOG_SURFACE: voice }
    volumes:
      - config:/home/node
    mem_limit: 8g
    shm_size: 2g
    command: node scripts/voice-bot.mjs

# Durable resources compose treats as external -- the Makefile (`ensure` target,
# which `make run`/`run-mail` depend on) creates them, and `docker compose down`
# leaves them intact.
networks:
  default:
    name: ${PROJECT}-net
    external: true

volumes:
  config:
    name: ${PROJECT}-app-config
    external: true
